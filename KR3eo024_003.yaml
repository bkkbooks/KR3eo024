body:
  text: 卷下七月七月七日勿念惡事仙家大忌白雲先生雜記七月七日取麻勃一升人參半升合蒸氣盡令遍服一刀圭令人知未然之事四時纂要七月七日取商陸根細切以玄水漬之三日陰乾可治為末服方寸匕以水服下日三服百日伏尸盡下出如人狀醮埋之祝曰伏尸當屬地我當屬天無復相召即去隨故道無還顧常先服之禁一切血肉辛菜物雲笈七籤七月七日取菖蒲酒服三方寸匕飲酒不醉好事者服之獲驗不可犯鐵若犯之令人吐逆千金方七月七日採松子過時即落不可得治服方寸匕日三四一云一服三合百日身輕三百日行五百里絶谷服升仙得飲水亦可和脂服之丸如梧桐子大服十丸同上七月七日午時取生瓜葉七枚直入北堂面向南立以拭面靨即當滅矣淮南子七月七日取烏雞血和三月三日桃花末塗面及遍身三二日肌白如玉太平御覽七月七日採守宮陰乾合以井花水和塗女身有文章如以丹塗之塗不去者不淫去者有奸此出淮南萬畢術又按博物志曰蝘蜒以器養之食以硃砂體盡赤所食滿七斤搗萬杵以點女人肢體終身不滅故號曰守宮又按萬畢術曰守宮飾女臂有文章守宮新合陰陽已各一藏之甕中陰百日飾女臂則生文章與子合陰陽輒滅去七月七日其夜灑掃於庭露施几筵設酒脯時果散香粉於筵上以祈牽牛織女見天漢中有奕奕白氣有光耀五色以此為徵應見者便拜而願乞富乞壽無子乞子為得乞一不得兼求三年乃得言之頗有受其祚者風土記七月七日取赤小豆男吞一七粒女吞二七粒令人畢歲無病韋氏月録七月七日曬曝革裘無蟲同上七月七日取蜘蛛網一枚著衣領中令人不忘此出四時纂要又按墨子祕録云七夕日取蜘蛛陰乾內衣領中令人不忘記事多七月七日取苦瓠瓤白絞取汁一合以酢一升古錢七文和漬微火煎之減半以沫內眼眥中治眼暗千金方七夕日取烏雞血點塗手面三日爛白如玉敷身亦三日以溫湯浴之墨子祕録七夕日取露蜂蛹子百枚陰百日令乾碾末用蜜和塗之可除䵟黷同上七夕日取螢火蟲二七枚撚發自黑矣同上七夕日取百合根熟搗用新瓦器盛密封掛於門上掛陰乾百日拔白髮用藥搽即生黑髮矣同上七夕日取螢火蟲蝦蟆端午日鼠膽伏翼和服半寸匕三七日見鬼可與語指伏寶矣同上七夕日取赤腹蜘蛛於屋下陰百日乾取塗足可行水上矣同上七月十一日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤七月十五日中元日可行道建齊修身謝過正一修真旨要七月十五日取佛座下土著臍中令人多智也四時纂要七月十五日收赤浮萍用筲箕盛放桶盛水曬乾為末遇冬雪寒水調三錢服又用漢椒末抹浮萍擦身上則熱不畏寒詩云不傍江津不傍岸用時須用七月半冷水裡面下三錢假饒鐵人也出汗瑣碎録當以七月十六日去手足爪燒作灰服之即自滅消九蟲下三尸雲笈七籤七月二十二日沐令發不白四時纂要七月二十五日浴令人長壽同上七月二十五日早食時沐浴令人進道雲笈七籤七月二十八日拔白終身不白四時纂要七月丑日取富家中庭土泥灶令人富勿令人知此出本草又按墨子祕録云七月內取富家田中土塗灶大富也七月食蓴上有蠋蟲害人白雲先生雜記七月食薤損目同上七月收角蒿置氈褥書籍中闢蛀蟲四時纂要七月之節宜出衣服圖書以暴之千金月令七月勿食菱芰作蟯蟲千金方七月食茱萸傷神氣同上七月勿食生蜜令人暴下發霍亂同上七月勿食獐肉動氣本草七月勿食雁傷神孫真人食忌立秋日以秋水下赤小豆云止赤白痢同上立秋太陽未升採揪葉熬為膏敷瘡瘍立愈謂之楸葉膏瑣碎録立秋日不可浴令人皮膚粗燥因生白屑同上立秋後五日瓜不可食千金月令入秋小腹多冷者用古磚煮汁服之主噦氣又令患處尉之三五度瘥本草七月中暑氣將伏宜以稍冷為理宜食竹葉粥其竹葉粥法取淡竹葉一握梔子兩枚切熬以水煎澄取清即細淅粳米研取泔下米於竹葉梔子汁中旋點泔煮之候熟下鹽花進之千金月令秋服黃耆等丸一兩劑則百病不生千金方秋不可食豬肺金匱要略方立秋後宜服張仲景八味地黃丸治男子虛羸百疾衆所不療者久服輕身不老加以攝養則成地仙其方用乾地黃半斤干薯藥四兩牡丹皮二兩澤瀉二兩附子炮二兩肉桂二兩山茱萸四兩湯泡五遍上搗篩蜜為丸如梧桐子大每日空腹酒下二十丸如稍覺熱即大黃丸一服通輕尤妙此出四時纂要又按養生論內一味用熟乾地黃秋三月早臥早起與雞俱興黃帝素問秋七十二日省辛增酸以養肝氣千金方秋日宜足腦俱凍雲笈七籤凡臥秋欲得頭向西有所利益同上秋初夏末熱氣酷甚不可於中庭脫露身背受風取涼五臟俞穴並會於背或令人扇風或揎露手足此中風之源若初染諸疾便宜服八味丸大能補理腑臟驅御邪氣仍忌三白恐沖剋藥性出四時養生論其八味丸方已具在前方用乾地黃此方用熟乾地黃八月八月一日已後即微火暖足勿令下冷無生意千金方弘農鄧紹八月朝入華山見一童子以五色囊承取柏葉下露露皆如珠子亦云赤松先生取以明目今八月朝作眼明囊也續齊諧記八月三日宜浴四時纂要八月四日勿市附足物仙家大忌同上八月七日沐令人聰明同上八月八日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤八月八日不宜眠千金月令八月十日四民並以朱點小兒頭名為天灸以厭疾也荊楚歲時記八月十九日拔白永不生四時纂要八月二十二日日出時沐浴令人無非禍雲笈七籤八月二十五日宜浴四時纂要八月辰日施錢一文日倍還富貴墨子祕録八月可食韭並可食露葵千金月令八月勿食生蒜傷人神損膽氣食醫心鏡八月勿食葫傷人神損膽氣令人喘悸脅肋氣急千金方八月勿食姜傷人神損壽同上八月勿食豬肺及飴和食之冬發疽同上八月勿食雞肉傷人神氣同上八月勿食雉肉損人神氣同上又云八月建丙日食雉肉令人短氣也八月食獐肉動氣本草八月勿食芹菜恐病蛟龍症發則似癲面色青黃小腹脹同上八月行途之間勿飲陰地流泉令人發瘧瘴又損腳令軟同上仲秋宜增酸減辛以養肝氣無令極飽令人壅雲笈七籤八月勿食生蜜多作霍亂同上八月勿食生果子令人多瘡同上仲秋肝臟少氣肺臟獨王宜助肝氣補筋養脾胃同上八月起居以時勿犯賊邪之風勿增肥腥令人霍亂同上八月勿食雞子傷神四時纂要八月宜合三勒漿非此月則不佳矣其法用訶梨勒毗梨勒醃摩勒以上並和核用各三兩搗如麻豆大用細白蜜一斗以新汲水二斗熟調投乾淨五斗瓷甕中即下三勒末熟攪數重紙密封三四日開更攪以乾淨帛拭去汗候發定即止但密封此月一日合滿三十日即成味至甘美飲之醉人消食下氣同上八月陰氣始盛冷疾者宜以防之千金月令八月採楮實水浸去皮瓤取中子日乾仙方單服其實正赤時取中子陰乾篩末水服二錢益久乃佳本草圖經八月前每個蟹腹內有稻穀一顆用輸海神待輸芒後過八月方食未經霜有毒食療本草秋分之日不可殺生不可以行刑罰不可以處房帷不可弔喪問疾不可以大醉君子必齊戒靜專以自檢千金月令九月九月九日採菊花與茯苓松柏脂丸服令人不老太清諸草木方九月九日俗以茱萸房插頭言辟惡氣而御初寒周處風土記九月九日佩茱萸食餌飲菊花酒令人長壽西京雜記九月九日以菊花釀酒其香且治頭風呂公歲時雜記九月九日天欲明時以片糕搭兒頭上乳保祝禱云如此云百事皆高也同上九月九日收枸杞浸酒飲不老亦不發白兼去一切風四時纂要九月九日菊花暴乾取家糯米一斗蒸熟用五兩菊花末同拌如常釀法多用細面曲為候酒熟即壓之去滓每暖小盞服治頭風頭旋聖惠方九月九日真菊花末飲服方寸匕治頭風不醒外臺祕要方九月九日勿起床席金書仙志戒九月十六日老子拔白日真誥九月十八日忌遠行不達其所雲笈七籤九月二十日宜齊戒沐浴淨念必得吉事天祐人福同上九月二十日雞三唱時沐浴令人闢兵同上九月二十一日取枸杞菜煮作湯沐浴令人光澤不病不老同上九月二十八日宜浴四時纂要九月之節始服夾衣陰氣既衰陽氣未伏可以餌補修之藥千金月令九月中宜進地黃湯其法取地黃淨洗以竹刀子薄切暴乾每作湯時先微火熬碾為末煎如茶法同上九月食姜損目此出千金方又曰九月勿食姜傷人神損壽九月勿食脾乃是季月土旺在脾故也同上九月勿食犬肉傷人神氣同上九月食霜下瓜血必冬發此出本草又孫真人云食霜下瓜或反胃病九月食獐肉動氣同上州縣城及人家九月內於戍地開坎深三尺以土埋炭五斤或五稱或五十斤或五百斤戍火墓也自然無火災千金方秒季月末一十八日省甘增咸以養胃氣秋季之月土旺時勿食生葵菜令人飲食不化發宿病同上季秋節約生冷以防癘疾勿食諸姜食之成痼疾勿食小蒜傷神損壽魂魄不安勿食蓼子損人志氣勿以豬肝和餳同食至冬成嗽病經年不瘥勿食鴉雉等肉損人神氣勿食雞肉令人魂不安魄驚散雲笈七籤季秋肝臟微肺金用事宜增酸以益肝氣助筋補血以及其時同上九月十日取章陸根三十斤淨洗粗切長二寸許勿令中風也絹囊盡盛懸屋北六十日陰燥為末以方寸匕水服之旦先食服十日見鬼六十日使鬼取金銀寶物作屋舍隨意所欲六十日見千里百日身飛行登風履云腸化為筋久服成仙矣同上十月十月一日宜沐浴四時纂要十月四日勿責罰人仙家大忌同上又按雲笈七籤云十月五日勿責罰人也十月十日宜拔白同上十月十三日老子拔白日真誥十月十四日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤十月十五日下元日可行道建齊修身謝過正一修真旨要十月十八日雞初鳴時沐浴令人長壽雲笈七籤十月上亥日採枸杞子二升採時面東摘生地黃汁三升以好酒二升於瓷瓶內浸二十一日取出研令地黃汁同浸攪之卻以三重封其頭了更浸候至立春前三日開已過逐日空心飲一杯至立春後髭鬢變白補益精氣服之耐老輕身無比經驗後方十月上已日採槐子服之槐者虛星之精去百病長生通神太清草木方十月之節始服寒服千金月令十月宜進棗湯其棗湯法取大棗除去皮核中破之於文武火上翻覆炙令香然後煮作湯同上十月勿食豬肉發宿疾白雲先生雜記十月勿食椒損心傷血脈千金方十月勿食生薤令人多涕唾同上十月勿食被霜菜令人面上無光澤眼目澀痛同上十月勿不得入房避陰陽純用事之月也同上十月食獐肉動氣本草冬七十二日省咸增苦以養心氣千金方冬月勿以梨攪熱酒而飲令頭旋不可枝梧瑣碎録冬月不可食豬腎金匱要略方冬夜伸足臥則一身俱暖同上冬夜臥衣被蓋覆太暖睡覺張目出其毒氣則永無眼疾同上凡臥冬欲得頭向西有所利益雲笈七籤冬日宜溫足凍腦同上孟冬早臥晚起必候天曉使至溫暢無泄大汗勿犯冰凍溫養神氣無令邪氣外至同上冬不枕冷物鐵石等令人眼暗同上冬月夜長及性熱少食溫軟物食訖搖動令消不爾成腳氣同上冬月食羊不發病他時月不可食本草冬月不宜多食蔥同上冬三月早臥晚起必待日光黃帝素問冬服藥酒兩三劑立春則止終身常爾則百病不生千金方冬月宜服鍾乳酒主補膏髓益氣力逐濕其方用乾地黃八分苣藤一升熬別爛搗牛膝四兩五加皮四兩地骨皮四兩桂心二兩防風二兩仙靈脾三兩鍾乳五兩甘草湯浸三日以半升牛乳瓷瓶中浸炊於炊飯上蒸之牛乳盡出暖水淨淘洗碎如麻豆上諸藥並細銼布袋子貯浸於三斗酒中五日後可取飲出一升清酒量其藥味即出藥起十月一日至立春止忌生蔥陳臭物四時纂要十一月十一月十日十一日拔白永不生四時纂要十一月十一日不可沐浴仙家大忌同上並雲笈七籤又按千金月令云十一日宜沐浴十一月十一日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤十一月十五日過夜半時沐浴令人不憂畏同上十一月十六日沐浴吉四時纂要十一月勿食龜鱉令人水病同上十一月勿食陳脯同上又按千金方云十一月勿食經夏臭脯成水病頭眩陰痿十一月勿食鴛鴦令人噁心同上十一月勿食生菜令人發宿疾同上十一月勿食生薤令人多涕唾千金方十一月勿食鼠肉燕肉損人神氣同上十一月食獐肉動氣本草十一月勿食蝦蚌著甲之物同上十一月陰陽爭冬至前後各五日別寢四時纂要十一月取章陸根淨洗粗切長二寸許勿令中風也絹囊盡盛懸屋北六十日陰燥為末以方寸匕水服之旦先食服十日見鬼六十日使鬼取金銀寶物作屋舍隨意所欲八十日見千里百日身飛行登風履云腸化為筋久服成仙矣雲笈七籤仲冬勿以炎火炙腹背勿食蝟肉傷人魂勿食焙肉宜減咸增苦以助其神氣勿食螺蚌蟹鱉等物損人志氣長尸蟲勿食經夏黍米中脯臘食之成水癖疾同上仲冬腎氣正王心肺衰宜助肺安神補理脾胃無乖其時勿暴溫暖切慎東南賊邪之風犯之令人多汗面腫腰脊強痛四肢不通同上十一月之節可以餌補藥不可以餌大熱之藥宜早食進宿熟之肉千金月令共工氏有不才子以冬至日死為疫鬼畏赤小豆故冬至日以赤小豆粥厭之四時纂要冬至日鑽燧取火可去溫病續漢書禮儀志冬至日陽氣歸內腹中熱物入胃易消化養生要集冬至日勿多言一陽方生不可大用瑣碎録每冬至日於北壁下厚鋪草而臥云受元氣千金方冬至日取胡蘆盛蔥汁根莖埋於庭中到夏至發之盡為水以漬金玉銀青石各三分自消矣曝令乾如飴可休良久服神仙名曰神仙消金玉漿又曰金漿三洞要録仲冬之月日短至陰陽爭諸生蕩君子齊戒處心掩身身欲寧去聲色禁嗜欲安形性事欲靜以待陰陽之定禮記十二月十二月一日宜沐浴雲笈七籤十二月二日宜浴去災四時纂要十二月三日宜齊戒燒香念仙雲笈七籤十二月七日拔白永不生四時纂要十二月八日沐浴轉除罪障荊楚歲時記十二月十三日夜半時沐浴令人得玉女侍房雲笈七籤十二月十五日沐浴去災四時纂要十二月二十三日沐吉同上十二月二十四日床底點燈謂之照虛耗也瑣碎録十二月勿食牛肉傷人神氣千金方十二月勿食生薤令人多涕唾同上又按雲笈七籤云季冬勿食生薤增痰飲疾十二月勿食蟹鱉損人神氣又六甲食之害人心神同上十二月勿食蝦蚌著甲之物同上十二月勿食獐肉動氣本草十二月勿食脾乃是季月土旺在脾故也千金方冬季之月土旺時勿食生葵菜令人飲食不化發宿病同上冬季月天一十八日省甘增咸以養腎氣同上季冬去凍就溫勿泄皮膚大汗以助胃氣勿甚溫暖勿犯大雪是月肺臟氣微腎臟方王可減咸增苦以養其神宜小宣不欲全補是月衆陽俱息水氣獨行慎邪風勿傷筋骨勿妄針刺以其血澀津液不行雲笈七籤季冬勿食豬㹠肉傷人神氣勿食霜死之果菜失人顏色勿食熊掌肉傷人神魂勿食生椒傷人血脈同上十二月癸丑日造門令盜賊不敢來墨子祕録十二月上亥日取豬肪脂內新瓦器中埋亥地百日主癰疽名肪脂方家用之又一升脂著雞子白十四枚更良本草宣帝時陰子方者臘日晨炊而灶神形見子再拜以黃羊祀之自是以後暴至巨富故後常以臘日祠灶搜神記歲暮臘埋圓石於宅隅雜以桃核七枚則無鬼疫南淮萬畢術臘夜持椒三七粒臥井旁勿與人言投於井中除溫疫養生要術臘日掛豬耳於堂梁上令人致富四時纂要臘日收豬脂勿令經水新器盛埋亥地百日治癰疽此月收亦得同上又按孫真人食忌云臘月豬肪脂可煎膏用之臘日取皂角燒為末遇時疫早起以井花水調一錢服之必效差同上臘月勿歌舞犯者必凶千金方臘月空心用蒸餅卷板豬脂食之不生瘡疥久服身體光滑瑣碎録臘月取豬脂四兩懸於廁上入夏一家即無蠅子同上臘日取活鼠以油煎為膏湯火瘡滅瘢疵極良本草圖經臘後遇除日取鼠一頭燒灰於子地上埋之永無鼠耗瑣碎録臘月好合藥餌經久不暍四時纂要臘月水日曬薦席能去蚤蝨瑣碎録臘月收雄狐膽若有人卒暴亡未移時者溫水微研灌入喉即活常須預備救人移時即無及矣續傳信方臘月好合茵陳丸療瘴氣時疫溫黃等若嶺表行此藥常須隨身其方用茵陳四兩大黃五兩豉心五合熬令香恆山三兩杷子仁三兩熬芒硝二兩杏仁三兩去皮尖熟研後入之鱉甲二兩炙去膜酒及醋塗炙巴豆一兩去皮心熬別研入之上九味搗篩蜜和為丸初得時氣三日旦飲服五丸如梧桐子大如人行十里或利或汗或吐或不吐不汗利等更服一丸五里久不覺即以熱飲促之老小以意酌度凡黃病痰癖時氣傷寒疒瘧小兒熱欲發癇服之無不差療瘴神效赤白痢亦效春初一服一年不病忌人莧蘆荀肉收瓶中以蠟固瓶口置高處逐時減出可三二年一合四時纂要臘月取青魚膽陰乾如患喉閉及骨鯁即以膽少許口中含咽津即愈齊人千金月令十二月暮日掘宅四角各埋一大石為鎮宅主災異不起本草十二月三十日取枸杞菜煮作湯沐浴令人光澤不病不老出雲笈七籤又按四時纂要云十日浴吉去災也十二月晦前兩日通晦三日齊戒燒香靜念仙家重之四時纂要十二月晦日日中懸屠蘇沉並中令至泥正月朔日平曉出藥置酒中煎數沸於東向戶中飲之屠蘇之飲先從小起多少自在一人飲一家無疫一家飲一里無疫飲藥酒得三朝還滓置井中能仍歲飲可世無病當家內外有井皆悉著藥闢瘟氣也其方用大黃十銖白朮十八銖桔梗十五銖去蘆頭蜀椒十五銖去目桂心十八銖去皮烏頭六銖炮去皮臍菝葜十二銖上七味㕮咀絳袋盛之出和劑局方一方又有防風一兩去蘆頭歲暮日閣家發投井中咒曰敕使某甲家口眷竟年不患傷寒闢卻五瘟鬼墨子祕録歲除夜積柴於庭燎火闢災而助陽氣四時纂要歲除夜空房中集衆燒皂角令煙不出眼淚出為限亦闢疫氣呂公歲時雜記除夜戒怒罵婢妾破壞器皿仍不可大醉也瑣碎録歲除夜集家中所不用藥焚之中庭以闢疫氣呂公歲時雜記除夜神佛前及廳堂房圂皆明燈至曉主家室光明瑣碎録歲夜於富家田內取土泥灶主招財同上歲除夜四更取麻子小豆各二七粒家人發少許投井中終歲不遭傷寒溫疫魚龍河圖除夜五更使一人堂中向空扇一人問云扇甚底答云扇蚊子凡七問乃已則無蚊蟲也瑣碎録
