body:
  text: 卷上正月正月一日子丑時燒糞掃令人倉庫不虛月令圖經元日子後醜前吞赤小豆七粒椒酒一合吉同上正月旦雞鳴時把火遍照五果及桑樹上下則無蟲時年有桑果災生蟲者元日照者必免災四時纂要元日寅時飲屠蘇酒自幼及長雜五行書正月旦及正月半以麻子赤豆二七顆置井中闢瘟病甚效同上元日平旦吞鹽豉七粒終歲不於食中誤吃蠅子呂公歲時雜記正月一日燒術及飲術湯同上元日服桃湯桃者五行之精厭伏邪氣制百鬼荊楚歲時記元日縷懸葦灰桃棒門戶上卻癘疫也同上元日日未出時朱書百病符懸戶上月令圖經正月一日未明小兒不長者以手攀東牆勿令人知或云於狗竇中使人牽拽瑣碎録元日庭前爆竹以闢山臊惡鬼也山臊在西方深山中長尺余性不畏人犯之令人寒熱病畏爆竹聲太平御覽元日造五辛盤正元日五熏煉形注曰五辛所以發五藏氣周處風土記正月一日取五木煮湯以浴令人至老鬚髮黑徐借注云道家謂青木香為五香亦云五木雜修養書元日進椒柏酒椒是玉衡星精服之令人身輕能音奈老柏是仙藥又云進酒次第當從小起以年少者為先崔實四民月令元日造桃板著戶謂之仙木像鬱壘山桃樹百鬼畏之玉燭寶典歲旦服赤小豆二七粒面東以韭汁下即一年不疾病家人悉令服之四時纂要正月一日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤正月一日取鵲巢燒之著於廁能闢兵四時纂要歲旦日埋敗履於庭中家出印緩墨子祕録正月朝早將物去冢頭取古磚一口將咒要斷一年無時疫懸安大門也本草臘月鼠向正旦朝所居處埋之闢瘟疫梅師方昔有齊人歐明者乘船過青草湖忽遇風晦瞑而逢青草湖君邀歸止家堂字謂歐明曰惟君所須富貴金玉等物吾當與卿明未知所答傍有一人私語明曰君但求如願並勝余物明依其人語湖君默默然須臾便許及出乃呼如願即是一少婢也湖君語明曰君領取至家如要物但就如願所須皆得明至家數年遂大富後至歲旦如願起宴明鞭之願以頭鑽糞帚中漸沒失所後明家漸漸貧今人歲旦糞帚不出戶恐如願在其中搜神記正月一日取鵲巢燒灰撒門裡闢盜墨子祕録正月三日買竹筒四枚置家中四壁上令田蠶萬倍錢財自來四時纂要正月四日拔白永不生凌晨拔神仙拔白日他月仿此拔白髭發也同上正月五日取商陸根細切以玄水漬之三日陰於可治為末服三寸匕玄水服下日三服百日伏尸盡下出如人狀醮埋之祝曰伏尸當屬地我當屬天無復相召即去隨故道無還顧常先服之禁一切血肉辛菜物雲笈七籤正月七日上會日可齋戒四時纂要正月七日男吞赤豆七顆女吞二七顆竟年不病雜五行書人日夜多鬼鳥過人家槌床打戶拔狗耳滅燈以禳之荊楚歲時記正月八日沐浴去災禍神仙沐浴日四時纂要正月十日人定時沐浴令人齒堅凡齋戒沐浴皆當盥沐五香湯其五香湯法用蘭香一斤荊花一斤零陵香一斤青木香一斤白檀一斤凡五物切之以水二斛五斗煮取一斛二斗以自洗浴也此湯辟惡除不祥氣降神靈用之以沐並治頭雲笈七籤廁前草月初上寅日燒中庭令人一家不著天行四時纂要正月上寅日持女青末三角縫囊盛系前帳中大吉能闢瘟病女青草也肘後方正月十五日殘糕糜熬令焦和谷種之能闢蟲也四時纂要正月十五日作膏粥以祠門戶玉燭寶典正月十五日作豆糜加油葷其上以祠門戶荊楚歲時記正月十五日燈盞令人有子夫婦共於富家局會所盜之勿令人知安臥床下當月有娠本草正月望日以柳枝插戶上隨柳枝所指處致酒脯祭之齋諧記云吳縣張成夜於宅東見一婦人曰我是地神明日月半宜以糕糜白粥祭我令君家蠶桑萬倍後果如言今人謂之黏錢財歲時記上元日可齋戒誦黃庭經令人資福壽四時纂要立春日食生菜不可過多取迎新之意及進漿粥以導和氣千金月令上學之士當以立春之日清朝煮白芷桃皮青木香三種東向沐浴雲笈七籤立春日鞭土牛庶民爭之得牛肉者其家宜蠶亦云治病公歲雜記後生於立春並社日食齏者至納婦拜門日腰間有聲如嚼齏然皆以為戒同上打春時春牛泥撒在簷下蚰蜒不上瑣碎録立春後有庚子日溫蕪菁汁合家大小並服不限多少可理時疫傷寒類要入春宜晚脫綿衣令人傷寒霍亂千金月令正月之節宜加綿襪以暖足千金月令正月宜進桑枝湯及造煎以備用其桑枝湯方取桑枝如箭桿大者細銼以酥熬作湯又桑枝煎方取桑枝大如箭桿者細銼三升熬令微黃以水六升煎三升去滓以重湯煎取二升下白蜜三合黃明膠一兩炙作末煎成以不津器封貯之同上正月韭始青可以食凡韭不可以作羹食損人作齏佳凡作齏佳以先削一所地去上一寸土取韭不洗便投沸湯中漉出鋪所削新土上良久然後入水淘擇同上正月不可釋綿襦宜食粥凡粥有三等一曰地黃以補虛取地黃四兩搗取汁候粥半熟即下之以綿裹椒一百粒生薑一斤投粥中候熟出之下羊腎一具去脂膜細切如韭葉大加少鹽食二曰防風以去四肢風取防風二大分煮取汁作粥三曰紫蘇以去壅氣取紫蘇子熬令黃香以水研濾取汁作粥同上正月勿食虎豹貍肉令人傷神損氣千金方正月不得食生蔥令人面上起遊風上同正月勿食梨梅師方正月食鼠殘多為鼠瘻小孔下血者是此病本草正月之節食五辛以闢癘氣蒜蔥韭薤薑也食醫心鏡正月雨水夫妻各飲一杯還房當獲時有子神效也本草正月初婚忌空房多招不祥不可不謹不得已當以熏籠置床上禳之瑣碎録正月甲子拔白晦日汲井花水服令髭發不白四時纂要正月未日夜蘆苣火照井廁中百鬼走荊楚歲時記正月寅日燒白髮吉千金方正月二日取章陸根三十斤淨先粗切長二寸許勿令中風也絹囊盡盛懸屋北六十日陰燥為末以方寸匕水服旦先食服十日見鬼六十日合鬼取金銀寶物作屋舍隨意所欲八十日見千里百日登風履云久服成仙雲笈七籤春不可食肝為肝王時以死氣入肝傷魂也金匱要略方春服小續命湯五劑諸補散各一劑百病不生千金方春月飲酒茹蔥以通五臟莊子春天月每朝梳頭一二百下至夜欲臥須湯去聲熱鹽湯一盆從膝下洗至足方臥以通泄風毒腳氣勿令壅滯四時養生論春七十二日省酸增甘以養脾氣千金方春間不可食鯽魚頭其中有蟲也瑣碎録春三月夜臥早起出黃帝素問又按雲笈七籤曰季春月宜臥起俱早趙先生曰欲除尸蟲之法春月擇甲乙夜視歲星所在朝之再拜正心竊祝曰原東方明星君扶我魂接我魄使我壽如松柏生年萬歲生不落願為甲除身中三尸九蟲盡走消滅常擇潔靜頻行之為善此仁德樂生君木也木剋土所以土尸去妙訣祕之雲笈七籤太虛真人曰常以春甲寅日夏丙午日秋庚申日冬壬子日瞑臥時先搗硃砂雄黃雌黃三物等分細搗以綿裹之使如棗大臨臥時塞兩耳中此消三尸練七魄之道也明日日中時以東流水沐浴畢更整飾床席易著衣物浣故者更履屐先除澡之都畢又掃灑於寢床下通令所住一室淨潔平安枕臥向上閉氣握固良久微咒曰天道有常改易故新上帝吉日沐浴為真三氣消尸朱黃安魂寶練七魄與我相親此道是消煉尸穢之上法改易真形之要訣也四時各取一日為之同上春日宜腦足俱凍同上又按千金月令曰正月之節宜加綿襪以暖之凡臥春欲得頭向東有所利益同上二月二月二日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤二月二日不欲眠千金月令昔巢氏時二月二乞得人子歸養之家便大富後以此日出野田中採蓬茨向門前以祭之云迎富歲華紀麗二月六日八日宜沐浴齋戒天祐其福雲笈七籤二月八日拔白神仙良日四時纂要二月八日黃昏時沐浴令人輕健雲笈七籤二月九日忌食一切魚鱉同上二月九日勿食魚仙家大忌白雲先生雜記二月十四日忌遠行水陸並不可往雲笈七籤二月勿食黃花菜及陳葅發痼疾動痼氣勿食大蒜令人氣壅關隔不通勿食蓼子及雞子滯人氣勿食小蒜傷人志性勿食兔肉令人神魂不安勿食狐貍肉傷人神同上二月腎臟氣微肝臟正王宜淨膈去痰宣泄皮膚令得微汗以散去冬溫伏之氣同上二月勿食梨梅師方二月勿食蓼傷腎白雲先生雜記二月勿食雞子令人常噁心千金方二月宜食韭大益人心同上二月行途之間勿飲陰地流泉令人發瘧瘴又損腳令軟本草二月初便須灸兩腳三里絶骨對穴各七壯以泄毒氣至夏即無腳氣衝心之疾四時養生論二月之節不可食生冷千金月令二月中不可弔喪問疾可衣夾衣同上每至二月吐痰緣中年向後瀉多困憊至於風勞氣冷多起自痰涎可取牛蒡子一合以上羌活一兩同牛蒡子搗為末入五更初投新汲水一碗打令勻略起東向服之便臥良久以撩胸膈當吐以盆盛之勿令起坐凡是塞滯痰涎出盡至黃膽水取妙盥漱訖取蒸餅切火上炙令黃便吃之仍煎薑蜜湯下至老不染瘴癘縱病亦不能害人頤生論二三月內天晴日取薯蕷洗去土小刀子刮去黑皮後又削去第二重白皮約厚一分已來於淨紙上著篩中曬至夜妝於紙籠內著微火養之至來日曬以干為度如未乾天色陰即火焙便為干薯藥入丸散用其第二重白皮依前別曬焙取為面絶補益四時纂要二月取百合根曝乾搗作面細篩絶益人同上二月丑日取土泥蠶屋宜蠶同上二月上卯日沐發愈疾南陽太守目盲太原王景有沉疴用之皆愈同上二月上辰日取道中土泥門戶闢官事同上二月上壬日取土泥屋四角大宜蠶也本草二月乙酉日日中北首臥合陰陽有子即貴也四時纂要桃杏花二月丁亥日收陰乾為末戊子日和井花水服方寸七日三服療婦人無子大驗同上二月庚寅日勿食魚大惡千金方驚蟄日以石灰糝門限外免蟲蟻出瑣碎録春分後宜服神明散其方用蒼朮桔梗各二兩附子二兩炮烏頭四兩炮細辛一兩上搗篩為散絳囊盛帶之方寸匕一人帶一家無病有染時氣者新汲水調方寸匕服之取汁便差千金月令春秋二社是日人家皆戒兒女夙興以舊俗相傳苟為宴起則社翁社婆遺屎其面上其後面黃者是驗也呂公歲時雜記社日小學生以蔥系竹竿上於窗中托之謂之開聰明或加之以蒜欲求能計算也同上社日學生皆給假幼女輟女工云是日不廢業令人懵同上社日飲酒治聾同上三月三月一日不得與女人同處大忌之雲笈七籤三月三日勿食百草外臺祕要方三月三日採艾為人挂戶以備一歲之灸用凡灸避人神之所在千金月令三月三日取桃花末收之至七月七日取烏雞血和塗面及身三二日後光白如素太平公主祕法四時纂要三月三日收桃葉曬乾搗篩井花水服一錢治心痛同上三月三日是神日勿食諸鱗物百歌三月三日乃上已日可以採艾及蔓菁花療黃病月令圖經上已日取黍曲和菜作羹以壓時氣荊楚歲時記三月三日取薺菜花鋪灶上及床席下可闢蟲蟻極驗瑣碎録三月三日收苦楝花或葉於席薦下可闢蚤同上三月三日勿食鳥魯五臟及一切果菜五辛等物大吉千金方三月三日取桃葉一云桃根搗取汁七升以大醋一升同煎令得五六分先食頓服之隔宿無食即尸蟲俱下本草三月三日勿食五臟肉百草心云笈書仙簽金戒三月三日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤三月六日申時洗頭令人利官七日旦浴日入時浴並招財四時纂要三月六日日入時沐浴令人無厄三月十一日老子拔白日真誥三月十三日拔白永不生四時纂要漢末有郭虞者有三女一女以三月一以上已二日而三女産乳並亡迄今時俗以為大忌故於是月是日婦女忌諱不復止家皆適東流水上就適遠地祈祓自潔濯也風土記三月十六日忌遠行水陸俱不可往雲笈七籤三月二十七日宜沐浴同上三月宜食韭大益人心此出千金方又按雲笈七籤曰季春食韭發疾三月勿食生薤本草三月勿食小蒜傷人志性千金方三月中可服單衣千金月令三月採桃花未開者陰乾百日與赤椹等分搗和臘月豬脂塗禿瘡神效四時纂要三月食雞子終身昏亂白雲先生雜記三月之節宜飲松花酒其法取糯米淘百遍以神麯和凡米一斗用神麯五兩春月取松花精長五六寸者至一尺余鼠尾者各三兩枝細銼一升蒸之絹袋盛以酒一升浸取五日堪服一服三合日三服久服神仙千金月令三月勿食脾乃是季月土旺在脾故也千金方三月羊糞曬乾煅灰存性和輕粉麻油可敷惡瘡一名百草霜瑣碎録三月勿食蛟龍肉及一切魚肉令人飲食不化發宿病傷人神氣恍惚此出千金纂要曰三月庚寅日凶三月入衡山之陰取不見日月松脂煉而餌之即不召而自來服之百日耐寒暑二百日五臟補益服之五年即見西王女同上三月不得食陳菹夏熱病發惡瘡本草三月採章陸一名商陸一名當陸如人形者神逐陰之精此神草也殺伏尸去面皯黑益智不忘男女五勞七傷婦人乳産余病帶下結赤白皆愈上用曲十斤米三斗加天門冬成末一斗釀酒漬章陸六日便齋服五日食減二十日谷腸肥容氣充茂諸蟲皆去耳目聰明皆滅以月宿與鬼日加丁時取商陸服如棗日三道士常種此藥草於靜室之一園使人通神令人不老長生去三蟲治百病毒不能傷矣雲笈七籤春季月食生葵令飲食不消化發宿疾食療本草春季月末一十八日省甘增咸以養腎氣千金方季春月陽熾陰伏勿發泄大汗以養臟氣勿食馬肉令人神魂不安勿食獐鹿肉等損氣損志雲笈七籤季春月肝臟氣伏心當向王宜益肝補腎是月火相水死勿犯西北風勿久處濕地必招邪毒勿大汗當風勿露體星宿下以招不祥之事同上世傳婦人死於産褥者其鬼唯於一百五日得自湔濯故人家於寒食前一日皆畜水是日不上井以避之呂公歲時雜記寒食日取黍穰於月德上取土脫墼一百二十口安宅福德上令人致福四時纂要寒食日以紙袋盛面挂當風處中暑調水服瑣碎録寒食日水浸糯米逐日換水至小滿漉出曬乾炒黃碾末水調療打撲傷損及諸瘡腫同上寒食一百五日預採大蓼曝乾能治氣痢用時搗羅為末食前粥米飲調下一錢最效同上清明前二日夜雞鳴時炊黍米熟取釜湯遍洗井口甕邊地則無馬蚿百蟲不近井甕甚神驗齊民要術清明日日未出時採薺菜花枝候乾夏日做挑燈杖能祛蚊薺菜亦名護生草於清明日取花陰乾暑月置近燈燭則能令蚊蛾不侵瑣碎録清明日尉斗內著火炒棗子於臥帳內上下令煙氣出令一人問炒甚的答曰炒狗蚤凡七問七答狗蚤不生矣同上四月四月四日昳時沐浴令人無訟雲笈七籤四月七日沐令人大富四時纂要四月八日不宜遠行宜安心靜念沐浴齋戒必得福慶攝生月令四月八日勿食百草外臺祕要方四月八日勿殺草伐樹全書志戒四月八日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤四月九日日沒時浴令人長命四時纂要四月十六日拔白則黑髮同上四月食雉令人氣逆食鱔魚害人白雲先生雜記四月之節宜服新衣宜進溫食宜服暖藥宜食羊腎臛造羊腎法上以菟絲子一兩研煮取汁濾之溲麵切煮服以羊腎一具切炒作臛服之尤療眼暗及赤痛千金月令四月之節宜服附子湯其方用附子一枚炮勿令焦為末分作三服以生薑一片用水一升煎取五合明早空腹服同上四月之節宜食筍以寬湯湧沸先旋湯轉然後投筍於中令其自轉不得攪攪即破候熟出之如此則色青而軟軟而不爛可以食和皮擘開內粳米飯細切羊肉並土蘇椒鹼豉汁鹽花等卻以面封之文火燒聞香即熟去皮厚一寸截之以進筍味此最佳同上四月之節可以飲椹酒尤治風熱之疾可以造椹煎其造椹煎法用椹汁三斗白蜜兩合酥一兩生薑汁一合以重湯煮椹汁取三升入鹽蘇等煮令得所於不津器中貯之每服一合和酒調服理百種風疾同上四月為乾生氣卯死氣酉是月也萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡疾攝生月令四月勿食雞肉勿食生薤同上四月宜補腎助肺調和胃氣無失其時同上四月勿食葫傷人神損膽氣令人喘悸脅肋氣急千金方四月勿食暴雞肉作內疽在胸腋下出漏孔丈夫少陽婦人絶孕虛勞之氣同上四月不得入房避陰陽純用事之月也同上四月勿食蛇肉鱔肉損神害氣同上四月勿食生蒜傷人神損膽氣食醫心鏡孟夏夜臥早起思無恕勿泄大汗雲笈七籤凡臥夏欲得頭向東有所利益同上夏不用枕冷物鐵石等令人眼暗同上夏月不得大醉四時養生論夏三月每朝空心吃少蔥頭酒令血氣通暢同上風毒腳氣因腎虛而得人生命門屬在於腎夏月腎氣衰絶若房色過度即傷元氣而損壽亦不宜多服疏藥同上夏二月宜用五枝湯澡浴浴訖以香粉敷身能祛瘴毒疏風氣滋血脈其五枝湯方用桑枝槐枝楮枝柳枝桃枝各一握麻葉二斤上件六味以水一石煎至八斗許去滓溫浴一日一次其敷身香粉方粟米一斤作粉如無粟米粉以葛粉代之亦得青木香麻黃根附子裂炮甘松藿香零陵香牡蠣已上各二兩上件八味杵羅為末以生絹作袋盛之浴畢敷身同上夏七十二日省苦增辛以養肺氣千金方夏月宜食苦蕒以益心瑣碎録夏三月夜臥早起無厭於日使志無怒黃帝素問夏不可食諸心金匱要略方五月五月一日日中時沐浴令人身光此出雲笈七籤又按荊楚歲時記曰五月一日沐浴令人吉利五月一日取枸杞菜煮作湯沐浴令人光澤不病不老雲笈七籤冢上土及磚石主瘟疫五月一日取之瓦器中盛埋之著門外階下閣家不患時氣五月五日採索五色桃印為門戶飾以止惡氣續漢書禮儀志五月五日取蟾蜍可合惡疽瘡取東行螻蛄治婦難産崔實四民月令五月五日蓄採衆藥以蠲除毒氣太平御覽五月五日荊楚人將艾以為人懸門戶上以禳毒氣荊楚歲時記五月五日以五彩絲係臂者闢兵及鬼令人不病溫風俗通五月五日未明時採艾見似人處攬而收之用灸有驗荊楚歲時記五月五日午時採艾治百病四時纂要五月五日取浮萍陰乾燒煙去蚊子千金月令五月五日午時採百藥心相和搗鑿桑樹心作孔內藥於其中以泥封之滿百日開取暴乾搗作末以敷金瘡同上五月五日粽子等勿多食食訖以菖蒲酒投之取菖蒲根節促者七莖各長一寸漬酒中服之治傷損同上五月五日午時聚先所蓄時藥燒之闢疫氣或止燒術呂公歲時雜記五月五日正午時於韭畦面東不語蚯蚓糞干而收之或為魚刺所鯁以少許擦咽外刺即消謂之六一泥同上五月五日目者以紅絹或榴花凡紅赤之物以拭目而棄之云得之者代受其病同上五月五日取青蒿搗石灰至午時丸作餅子收蓄凡金刃所傷者錯末傳之同上五月五日午時宜合瘧疾鬼哭丹先以好砒半兩細碎安放鐵銚內以寒水石一兩為末圍定然後以瓷碗蓋卻濕紙封碗縫炭火熬煙出熏紙黃色即止取出以紙襯放地上出火氣毒良久細研為末入龍腦麝香各少許研勻後以蒸餅水泡為丸如梧桐子大硃砂為衣每服一丸發日早晨於功德堂香煙上度過面北方井花水吞下忌熱食魚面生果十數日永瘥此藥合時忌婦人僧尼雞犬及孝服人見如女人有疾可令男子拈入口內服之立效藥不吐瀉四時養生論五月五日用尉斗燒一棗置床下闢狗蚤瑣碎録五月五日作赤靈符著心前禁闢五兵抱朴子五月五日午時以硃砂寫茶字倒貼之蛇蠍不敢近瑣碎録五月五日五更使一人堂中向空扇一人問云扇甚底答蚊子凡七問乃已則無蚊蟲同上五月五日午時寫白字倒貼於柱上四處則無蠅子同上五月五日午時望太陽將水咒曰天上金雞吃蚊子腦髓燈心上吸太陽氣念咒七次遇夜將燈心點照闢去蚊子同上五月五日取鱉爪著衣領中令人不忘同上五月五日萵苣成片放櫥匱內闢蟲蛀衣帛等物收萵苣葉亦得同上五月五日取臘水洗屋下闢蚊蠅同上五月五日收葵子微炒搗羅為末患淋疾者每食前以溫酒調下一錢最驗同上五月五日取鯉魚枕骨燒服止久痢千金方五月五日勿以鯉魚子共豬肝食必不消化成惡疾同上五月五日鱉子共鮑魚子食之作疸黃上同五月五日取露草一百種陰乾燒為灰和井花水重煉令釅醋為餅腋下挾之干即易主腋氣臭當抽一身間瘡出即以小便洗之本草五月五日日中時取葛根為屑療金瘡斷血亦療瘧同上五月五日取豬齒治小兒驚癇燒灰服並治蛇咬同上五月五日取蝙蝠倒懸者曬乾和桂薰陸香為末燒之蚊子去同上五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘千金翼方五月五日採莧菜和馬齒莧為末等分調與妊娠服之易産食療本草五月五日勿見血物雲笈七籤五月五日午時桃仁一百個去皮尖於乳鉢中細研成膏不得犯生水候成膏入黃丹三錢丸如梧桐子大每服三丸當瘧發日面北用溫酒吞下如不飲酒井花水亦得合時忌雞犬婦人見本草端午日午時或歲除夜收豬心血同黃丹乳香相和研為丸如雞頭大以紅絹袋盛挂於門上如有子死腹中者冷酒磨下一丸博濟方端午日取白礬一塊自早日曬至晚收之凡百蟲所齧以此末敷之瑣碎録五月五日以蘭湯沐浴大戴禮五月五日取蠶蛾為末津調塗刺頭上刺良久即出本法用晚蠶蛾蓋將臀倒點濕繭子頭出者生收用竹筒兩頭有節者於一頭錐穿放入蛾塞之令自在乾死遇有竹木等刺肉內不能出者取少許為末點刺上即出廣惠方五月五日取百草頭細銼曬乾用紙裹收之要用取一撮以白紙封角勿令病人開以絳帛系藥先以眼案臂面北系裡臁藥下以當三錢奠系之男左臂女右臂治一切瘧疾極有驗衛生十全方五月五日取蒜一片去皮中破之刀割令容巴豆一枚去心皮內蒜中令合以竹挾以火炙之取可熱搗為三丸遇患瘧者未發前服一丸不止復與一丸肘後方五月五日及夏至日取日未出時面東汲井花水一盞作三漱門閫中如此三十日即口臭永除矣墨子祕録五月五日取螢火蟲二七枚撚發自黑矣同上五月五日勿食一切生菜發百病瑣碎録又出千金方端午日午時書儀方二字倒貼於柱腳上能闢蚊蟲瑣碎録端午收蜀葵赤白者各收陰乾治婦人赤白帶下赤者治赤白者治白為末酒服之四時纂要端午日採桑上木耳白如魚者有患喉閉者搗碎綿裹如彈丸蜜浸含之便瘥同上端午日日未出時採百草頭唯藥苗多即尤佳不限多少搗取濃汁又取石灰三五升取草汁相和搗脫作餅子曝乾治一切金瘡血立止兼治小兒惡瘡同上端午日取葵子燒作灰收之有患石淋者水調方寸服之立愈同上取獨頭蒜五顆黃丹二兩午月午日午時中搗蒜如泥調黃丹為丸如雞頭子大曬乾患心痛醋磨一丸服之同上端午日午時不可取井花水沐浴一年疫氣不去瑣碎録端午日午時有雨將天雨水研硃砂於好紙上書龍字如小錢大次年端午日午時有雨用黑筆亦書龍字如前字大二字合之圓作小丸臨産用乳香煎湯吞下男左女右握出如次年午時無雨則前字不可用矣同上蘩蔞一名雞腸草主積年惡瘡痔不愈者五月五日日中採之乾燒作焦灰用千金方小蒜五月五日採暴乾葉主心煩痛解諸毒小兒丹疹同上五月二十日宜拔白四時纂要五月君子齋戒節嗜欲薄滋味是月五日六日十六日別寢犯之三年致卒同上五月五日六日七日十五日十六日十七日二十五日二十六日二十七日九毒忌房事犯之不過三年瑣碎録五月俗稱惡月俗多六齋放生按月令仲夏陰陽交死生分君子齋戒止聲色節嗜欲也董勳問禮俗五月勿食韭令人乏氣力此出金匱要略方又白雲先生雜忌云損人目俗忌五月上屋言人五月蛻精神如上屋即自見其形魂魄則不安矣酉陽雜俎俗忌五月曝床薦席按異苑云新野庚實嘗以五月曝席忽見一小兒死在席上俄失之其後是子遂亡太平御覽五月宜服五味子湯其方取五味子一大合以木杵臼搗之置小瓷瓶中以百沸湯點入少蜜即密封頭置火邊良久乃堪服千金月令五月勿食肥濃勿食煮餅伏陰在內可食溫暖之味月令圖經五月勿食獐肉傷人神氣千金方五月勿食馬肉傷人神氣同上五月勿飲澤中停水令人患鱉瘕病也本草五月戊辰日用豬頭祭灶令人百事通泰墨子祕録五月勿食鹿傷神本草五月食未成核果令人發癰癤及寒熱同上仲夏勿大汗當風勿暴露星宿皆成惡疾勿食雞肉生癰疽漏瘡勿食鱔蛇等肉食則令人折算壽神氣不安雲笈七籤夏至浚井改水可去溫病續漢書禮儀志夏至著五綵闢兵題曰遊光厲鬼知其名者無溫疾風俗通京輔舊俗皆謂夏至日食百家飯則耐夏然百家飯難集相會於姓柏人家求飯以當之呂公歲時雜記夏至一陰生皆服餌硫黃以折陰氣同上今服金液丹也夏至日採映日果即無花果也治咽喉同上夏至後迄秋分勿食肥膩餅臛之屬此與酒漿果瓜相妨入秋節變生多諸暴下雲笈七籤六月六月一日沐令人去疾禳災四時纂要六月六日沐浴齋戒絶其營俗此出雲笈七籤又按瑣碎録云六月六日忌水分俗云令人狐臭六月六日勿起土金書仙志戒六月七日八日二十一日浴令人去疾禳災四時纂要六月十九日拔白永不生同上六月二十四日老子拔白日真誥六月二十四日忌遠行水陸俱不可往雲笈七籤六月二十七日食時沐浴令人輕健同上六月二十七日取枸杞菜煮作湯沐浴令人光澤不病不老同上六月可以飲烏梅漿止渴其造梅漿法用烏梅並取核中仁碎之以少蜜內熟湯調之千金月令六月可以飲木瓜漿其造木瓜漿法用木瓜削去皮細切以湯淋之加少薑汁沉之井中冷以進之同上六月勿食澤水令人病鱉癥四時纂要六月食韭目昏千金方六月勿食脾乃是季月土旺在脾故也同上六月勿食茱萸傷神氣同上六月勿食羊肉傷人神氣同上六月勿食鶩肉傷人神氣同上六月勿食雁肉傷人神氣同上季夏增咸減甘以資腎臟是月腎臟氣微脾臟絶王宜減肥濃之物宜助腎氣益固筋骨切慎賊邪之氣勿沐浴後當風勿專用冷水浸手足慎東來邪風犯之令人手癱緩體重氣短四肢無力雲笈七籤季夏勿食羊血損人神魂少志健忘勿食生葵必成水癖同上夏季月末一十八日省甘增咸以養腎氣千金方夏季月食露葵者犬噬終身不瘥四時纂要夏季之月土王時勿食生葵菜令人飲食不消化發宿病千金方暑月不可露臥瑣碎録暑月極熱扇手心則五體俱涼同上造醬於三伏內黃道日浸豆黃道日蒸拌黃忌婦人見即無蝸蟲同上六月伏日並作湯餅名為辟惡荊楚歲時記伏日切不可迎婦婦死已不還家四時纂要三伏日宜服腎瀝湯治丈夫虛羸五勞七傷風濕腎臟虛竭耳聾目暗其方用乾地黃六分黃耆六分白茯苓六分五味子四兩羚羊角屑四兩桑螵蛸四兩微炙地骨皮四兩桂心四兩麥門冬去心五分防風五分磁石十二分碎如棋子洗至十數回令黑汁盡白羊腎一具豬亦得去脂膜如柳葉切上以水四大升先煮腎耗水升半許即去水上肥沫等去腎滓取腎汁煎諸藥取八大合絞去滓澄清分為三服三伏日各服一劑極補虛復治丈夫百病藥亦可以隨人加減忌大蒜生蔥冷陳滑物平旦空心服之此出四時纂要又按千金方云夏大熱則服腎瀝湯三劑百病不生
